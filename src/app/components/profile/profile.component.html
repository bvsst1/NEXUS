<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-8">
      <div class="form-panel reveal">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
          <div>
            <span class="eyebrow">perfil editable</span>
            <h1 class="mt-3 mb-2">Actualiza tus datos antes de confirmar la compra.</h1>
          </div>
          <div class="align-self-md-start">
          </div>
        </div>
        <form (ngSubmit)="saveProfile()">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-name">Nombre</label>
              <input id="profile-name" name="name" class="form-control glass-input" type="text" [(ngModel)]="formData.name" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-email">Correo</label>
              <input id="profile-email" name="email" class="form-control glass-input" type="email" [(ngModel)]="formData.email" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-phone">Telefono</label>
              <input id="profile-phone" name="phone" class="form-control glass-input" type="tel" [(ngModel)]="formData.phone">
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-city">Ciudad</label>
              <input id="profile-city" name="city" class="form-control glass-input" type="text" [(ngModel)]="formData.city">
            </div>

            <div class="col-12">
              <label class="form-label" for="profile-address">Direccion de despacho</label>
              <input id="profile-address" name="address" class="form-control glass-input" type="text" [(ngModel)]="formData.address">
            </div>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-3 mt-4">
            <button class="btn btn-soft" type="submit">Guardar cambios</button>
            <button class="btn btn-warm" type="button" [disabled]="!cartItems()" (click)="completePurchase()">
              Finalizar compra ({{ cartItems() }} items)
            </button>
          </div>

          <div *ngIf="saved" class="notice mt-3">Perfil actualizado en localStorage.</div>
        </form>
      </div>
    </div>
  </div>
</main>
