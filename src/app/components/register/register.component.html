<section class="section-block auth-page">
  <div class="container">
    <div class="form-panel reveal">
      <span class="eyebrow">registro cliente</span>
      <h1 class="mt-3 mb-3">Crea tu cuenta para seguir tu proxima compra</h1>
      <p class="mb-4">Formulario academico con binding bidireccional y sin validaciones manuales.</p>

      <form>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="register-name">Nombre</label>
            <input id="register-name" name="name" class="form-control" type="text" [(ngModel)]="formData.name">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label" for="register-email">Correo</label>
            <input id="register-email" name="email" class="form-control" type="email" [(ngModel)]="formData.email">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label" for="register-password">Contrasena</label>
            <input id="register-password" name="password" class="form-control" type="password" [(ngModel)]="formData.password">
          </div>

          <div class="col-12">
            <label class="form-label" for="register-city">Ciudad</label>
            <input id="register-city" name="city" class="form-control" type="text" [(ngModel)]="formData.city">
          </div>
        </div>

        <button class="btn btn-warm w-100 mt-4" type="button">Crear cuenta</button>
      </form>
    </div>
  </div>
</section>
