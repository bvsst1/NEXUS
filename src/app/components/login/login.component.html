<section class="section-block auth-page">
  <div class="container">
    <div class="form-panel reveal">
      <span class="eyebrow">ingreso cliente</span>
      <h1 class="mt-3 mb-3">Accede a tu cuenta Nexus</h1>
      <p class="mb-4">Formulario base con Angular y ngModel, sin validaciones agregadas.</p>

      <form>
        <div class="mb-3">
          <label class="form-label" for="login-email">Correo</label>
          <input id="login-email" name="email" class="form-control" type="email" [(ngModel)]="formData.email">
        </div>

        <div class="mb-4">
          <label class="form-label" for="login-password">Contrasena</label>
          <input id="login-password" name="password" class="form-control" type="password" [(ngModel)]="formData.password">
        </div>

        <button class="btn btn-warm w-100" type="button">Ingresar</button>
        <a class="btn btn-soft w-100 mt-3" routerLink="/recover-password">Recuperar contrasena</a>
      </form>
    </div>
  </div>
</section>
