<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7">
      <div class="form-panel reveal">
        <span class="eyebrow">recuperacion simple</span>
        <h1 class="mt-3 mb-2">Te ayudamos a volver a entrar.</h1>
        <p class="mb-4">Recupera el acceso a tu cuenta.</p>

        <form (ngSubmit)="sendInstructions()">
          <div class="mb-3">
            <label class="form-label" for="recover-email">Correo registrado</label>
            <input id="recover-email" name="email" class="form-control" type="email" [(ngModel)]="email">
          </div>

          <button class="btn btn-warm w-100" type="submit">Enviar instrucciones</button>
          <div *ngIf="sent" class="notice mt-3">Simulacion enviada a {{ email || 'tu correo registrado' }}.</div>
        </form>
      </div>
    </div>
  </div>
</main>
