<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="login">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">
          <div class="form-panel reveal">
            <span class="eyebrow">inicio de sesion</span>
            <h1 class="mt-3 mb-2">Vuelve a tu mesa en segundos.</h1>
            <p class="mb-4">Ingresa a tu cuenta.</p>
            <form data-auth-form="login" novalidate>
              <div class="mb-3">
                <label class="form-label" for="email">Correo electronico</label>
                <input class="form-control" id="email" name="email" type="email" data-validate="required|email">
                <div class="form-error" data-error-for="email"></div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Contrasena</label>
                <input class="form-control" id="password" name="password" type="password" data-validate="required">
                <div class="form-error" data-error-for="password"></div>
              </div>
              <button class="btn btn-warm w-100" type="submit">Ingresar</button>
            </form>
            <div class="d-flex flex-column flex-sm-row justify-content-between gap-2 mt-4">
              <a href="recover.html">Recuperar contrasena</a>
              <a href="register.html">Crear cuenta nueva</a>
              <a href="../index.html">Volver al inicio</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
