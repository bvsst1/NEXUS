<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="register">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-8">
          <div class="form-panel reveal">
            <span class="eyebrow">registro cliente</span>
            <h1 class="mt-3 mb-2">Crea una cuenta para guardar tu carrito y personalizar tu experiencia.</h1>
            <form data-auth-form="register" novalidate>
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label" for="name">Nombre completo</label>
                  <input class="form-control" id="name" name="name" type="text" data-validate="required">
                  <div class="form-error" data-error-for="name"></div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="email">Correo electronico</label>
                  <input class="form-control" id="email" name="email" type="email" data-validate="required|email">
                  <div class="form-error" data-error-for="email"></div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="phone">Telefono</label>
                  <input class="form-control" id="phone" name="phone" type="tel" data-validate="required">
                  <div class="form-error" data-error-for="phone"></div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="city">Ciudad</label>
                  <input class="form-control" id="city" name="city" type="text" data-validate="required">
                  <div class="form-error" data-error-for="city"></div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="password">Contraseña</label>
                  <input class="form-control" id="password" name="password" type="password" data-validate="required|password">
                  <div class="form-error" data-error-for="password"></div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
                  <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" data-validate="required">
                  <div class="form-error" data-error-for="confirmPassword"></div>
                </div>
              </div>
              <button class="btn btn-warm w-100 mt-4" type="submit">Crear cuenta</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
