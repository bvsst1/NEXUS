<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago exitoso | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="checkout">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="content-panel reveal text-center">
            <span class="eyebrow">pago</span>
            <h1 class="mt-3 mb-3">Confirma tu compra.</h1>
            <p>Revisa tu pedido y finaliza cuando quieras.</p>
            <button class="btn btn-warm btn-lg mt-2" data-complete-order>Finalizar compra</button>
            <div class="notice mt-3 d-none" data-checkout-message></div>
            <a class="btn btn-outline-warm mt-4" href="../index.html">Volver al inicio</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
