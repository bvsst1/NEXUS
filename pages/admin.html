<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="admin">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row g-4">
        <div class="col-12">
          <div class="content-panel reveal">
            <span class="eyebrow">panel de administracion</span>
            <h1 class="mt-3 mb-0">Gestion de productos y usuarios.</h1>
          </div>
        </div>
        <div class="col-12 col-xl-5">
          <section class="content-panel reveal reveal-delay-1">
            <h2 class="h3 mb-3" data-admin-form-title>Agregar producto</h2>
            <form data-admin-form>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label" for="name">Nombre</label>
                  <input class="form-control" id="name" name="name" type="text">
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="category">Categoria</label>
                  <input class="form-control" id="category" name="category" type="text">
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="players">Jugadores</label>
                  <input class="form-control" id="players" name="players" type="text">
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="price">Precio</label>
                  <input class="form-control" id="price" name="price" type="number" min="1">
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label" for="image">Imagen</label>
                  <input class="form-control" id="image" name="image" type="url">
                </div>
                <div class="col-12">
                  <label class="form-label" for="description">Descripcion</label>
                  <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                </div>
              </div>
              <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                <button class="btn btn-warm" type="submit" data-admin-submit>Guardar producto</button>
                <button class="btn btn-outline-warm d-none" type="button" data-admin-cancel>Cancelar edicion</button>
              </div>
              <div class="notice d-none" data-admin-notice></div>
            </form>
          </section>
        </div>
        <div class="col-12 col-xl-7">
          <section class="content-panel reveal reveal-delay-2">
            <h2 class="h3 mb-3">Catalogo disponible</h2>
            <div class="table-shell">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Juego</th>
                    <th>Categoria</th>
                    <th>Jugadores</th>
                    <th>Precio</th>
                    <th class="text-end">Acciones</th>
                  </tr>
                </thead>
                <tbody data-admin-products></tbody>
              </table>
            </div>
          </section>
        </div>
        <div class="col-12 col-xl-5">
          <section class="content-panel reveal reveal-delay-3">
            <h2 class="h3 mb-3">Usuarios registrados</h2>
            <div class="table-shell">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Telefono</th>
                    <th>Rol</th>
                  </tr>
                </thead>
                <tbody data-admin-users></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
