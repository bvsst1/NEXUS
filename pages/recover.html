<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contrasena | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="recover">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">
          <div class="form-panel reveal">
            <span class="eyebrow">recuperacion simple</span>
            <h1 class="mt-3 mb-2">Te ayudamos a volver a entrar.</h1>
            <p class="mb-4">Recupera el acceso a tu cuenta.</p>
            <form data-auth-form="recovery" novalidate>
              <div class="mb-3">
                <label class="form-label" for="email">Correo registrado</label>
                <input class="form-control" id="email" name="email" type="email" data-validate="required|email">
                <div class="form-error" data-error-for="email"></div>
              </div>
              <button class="btn btn-warm w-100" type="submit">Enviar instrucciones</button>
              <div class="notice mt-3 d-none" data-form-notice></div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
