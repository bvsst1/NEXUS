<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="cart">
  <div class="page-shell">
    <main class="container py-5">
      <div class="row g-4">
        <div class="col-12 col-lg-8">
          <section class="content-panel reveal">
            <span class="eyebrow">carrito de compras</span>
            <h1 class="mt-3 mb-4">Tu seleccion para la proxima noche de juego.</h1>
            <div data-cart-items></div>
          </section>
        </div>
        <div class="col-12 col-lg-4">
          <aside class="content-panel reveal reveal-delay-1">
            <span class="eyebrow">resumen</span>
            <div class="mt-3" data-cart-summary></div>
          </aside>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
